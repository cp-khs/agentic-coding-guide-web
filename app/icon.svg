<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- Antenna base -->
  <rect x="14.5" y="5" width="3" height="6" rx="1.5" fill="#6d28d9"/>
  <!-- Antenna tip (glowing dot) -->
  <circle cx="16" cy="4" r="2.5" fill="#a78bfa"/>
  <circle cx="16" cy="4" r="1.2" fill="#c4b5fd"/>

  <!-- Robot face -->
  <rect x="6" y="10" width="20" height="15" rx="4" fill="#1e1b4b"/>
  <rect x="6" y="10" width="20" height="15" rx="4" fill="none" stroke="#6d28d9" stroke-width="1.2"/>

  <!-- Left eye -->
  <circle cx="11.5" cy="17" r="3" fill="#6d28d9"/>
  <circle cx="11.5" cy="17" r="1.8" fill="#8b5cf6"/>
  <circle cx="10.8" cy="16.2" r="0.7" fill="#ddd6fe"/>

  <!-- Right eye -->
  <circle cx="20.5" cy="17" r="3" fill="#6d28d9"/>
  <circle cx="20.5" cy="17" r="1.8" fill="#8b5cf6"/>
  <circle cx="19.8" cy="16.2" r="0.7" fill="#ddd6fe"/>

  <!-- Mouth: terminal prompt ">_" style -->
  <rect x="10" y="21.5" width="12" height="2" rx="1" fill="#312e81"/>
  <rect x="11" y="22" width="4" height="1" rx="0.5" fill="#7c3aed"/>
  <rect x="16.5" y="22" width="3" height="1" rx="0.5" fill="#6d28d9"/>
</svg>
