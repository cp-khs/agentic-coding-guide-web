<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Antenna -->
  <line x1="16" y1="4.5" x2="16" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="16" cy="3.5" r="1.5" fill="white"/>

  <!-- Robot head -->
  <rect x="5" y="9" width="22" height="16" rx="4" fill="none" stroke="white" stroke-width="2" stroke-linejoin="round"/>

  <!-- Ear left -->
  <path d="M5 14 L2.5 14 L2.5 19 L5 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Ear right -->
  <path d="M27 14 L29.5 14 L29.5 19 L27 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Eyes (filled white circles) -->
  <circle cx="12" cy="16" r="2.2" fill="white"/>
  <circle cx="20" cy="16" r="2.2" fill="white"/>

  <!-- Smile -->
  <path d="M11.5 21 Q16 23.5 20.5 21" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
